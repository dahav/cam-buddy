[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
upload_speed = 460800

monitor_rts = 0
monitor_dtr = 0

board_build.partitions = min_spiffs.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=4

lib_deps =
    https://github.com/tzapu/WiFiManager.git